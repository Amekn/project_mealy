name: mealy-release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

concurrency:
  group: mealy-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: '0'
  FEDORA_IMAGE: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
  ARCH_IMAGE: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678

jobs:
  browser-conformance:
    name: Verify pinned rendered-browser boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: rustup show
      - name: Prepare Bubblewrap and pinned Chrome Headless Shell
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes \
            apparmor-profiles apparmor-utils bubblewrap curl fonts-liberation \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libdbus-1-3 libexpat1 libgbm1 libglib2.0-0t64 libnspr4 libnss3 libudev1 \
            libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxkbcommon0 libxrandr2 unzip
          scripts/prepare-bwrap-boundary.sh
          browser_bundle=$(scripts/fetch-browser-runtime.sh "$RUNNER_TEMP/mealy-browser")
          echo "MEALY_BROWSER_BUNDLE=$browser_bundle" >>"$GITHUB_ENV"
      - run: >-
          cargo test --locked -p mealy-infrastructure --all-features
          --test browser_runtime -- --ignored
      - run: >-
          cargo test --locked -p mealyd --all-features --test real_provider
          configured_browser_is_rendered_isolated_cited_and_replays_without_live_chrome
          -- --ignored
      - run: >-
          cargo test --locked -p mealyctl --all-features --test browser_configuration
          -- --ignored
      - name: Validate locked dependency policy
        shell: bash
        run: |
          set -euo pipefail
          cargo_deny=$(scripts/fetch-cargo-deny.sh "$RUNNER_TEMP/cargo-deny")
          "$cargo_deny" check

  soak-subject-promotion:
    name: Promote checked x86 soak subject
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      # Draft release visibility requires push-level repository access. Keep that ephemeral
      # authority out of every build, package, attestation, and publication job.
      contents: write # Read the manifest-pinned private draft asset for this run's handoff.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch and validate the exact soaked daemon
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir promoted
          : >promoted/mealyd
          scripts/fetch-release-soak-subject.sh \
            docs/benchmarks/release-soak-subject.json \
            docs/benchmarks/release-soak.json \
            promoted/mealyd "$GITHUB_REPOSITORY"
          scripts/validate-release-soak.sh \
            docs/benchmarks/release-soak.json promoted/mealyd "$GITHUB_SHA"
      - name: Retain the checked subject for this workflow run only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-soak-subject-${{ github.run_id }}
          path: promoted/mealyd
          if-no-files-found: error
          retention-days: 1

  linux-packages:
    name: Verify and package ${{ matrix.target }}
    needs: soak-subject-promotion
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      actions: read       # Confirm live-provider acceptance for the exact tagged commit.
      contents: read
      id-token: write      # Mint the short-lived identity used by actions/attest.
      attestations: write  # Publish attestations for this architecture's assets.
      artifact-metadata: write # Record the subjects linked to each attestation.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x86_64-gnu
            host_architecture: x86_64
          - runner: ubuntu-24.04-arm
            target: linux-aarch64-gnu
            host_architecture: aarch64
    env:
      MEALY_TARGET: ${{ matrix.target }}
      MEALY_HOST_ARCHITECTURE: ${{ matrix.host_architecture }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Retrieve this run's checked x86 soak subject
        if: ${{ matrix.target == 'linux-x86_64-gnu' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-soak-subject-${{ github.run_id }}
          path: ${{ runner.temp }}/mealy-soak-subject
      - name: Require an explicit public-use project license
        run: scripts/validate-public-license.sh .
      - run: rustup show
      - name: Verify tag, host architecture, and package identity
        shell: bash
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME}
          workspace_version=$(cargo metadata --locked --no-deps --format-version 1 | \
            jq -r '.packages[] | select(.name == "mealyd") | .version')
          scripts/validate-release-tag.sh "$tag" "$workspace_version"
          test "$(git tag --points-at HEAD | grep -Fx "$tag")" = "$tag"
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          test "$(uname -m)" = "$MEALY_HOST_ARCHITECTURE"
      - name: Require reviewed live-provider acceptance for the exact commit
        if: ${{ matrix.target == 'linux-x86_64-gnu' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/live-smoke.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f event=workflow_dispatch \
            -f status=success \
            -F per_page=100)
          runs_file="$RUNNER_TEMP/mealy-live-provider-runs.json"
          printf '%s\n' "$runs" >"$runs_file"
          scripts/select-live-provider-acceptance.sh \
            "$runs_file" "$GITHUB_SHA" "$GITHUB_REPOSITORY" \
            "$GITHUB_SERVER_URL" >/dev/null
      - name: Require protected main CI for the exact commit
        if: ${{ matrix.target == 'linux-x86_64-gnu' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f branch=main \
            -f event=push \
            -f status=success \
            -F per_page=100)
          runs_file="$RUNNER_TEMP/mealy-protected-ci-runs.json"
          printf '%s\n' "$runs" >"$runs_file"
          scripts/select-protected-ci-run.sh \
            "$runs_file" "$GITHUB_SHA" "$GITHUB_REPOSITORY" \
            "$GITHUB_SERVER_URL" >/dev/null
      - name: Establish reproducible source epoch
        shell: bash
        run: |
          set -euo pipefail
          source_date_epoch=$(git show -s --format=%ct HEAD)
          test "$source_date_epoch" -ge 1
          echo "SOURCE_DATE_EPOCH=$source_date_epoch" >>"$GITHUB_ENV"
      - name: Prepare Bubblewrap boundary
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils binutils bubblewrap lintian shellcheck
          scripts/prepare-bwrap-boundary.sh
      - run: cargo fmt --all -- --check
      - name: Validate shell entry points
        shell: bash
        run: |
          set -euo pipefail
          bash -n packaging/*.sh scripts/*.sh
          shellcheck packaging/*.sh scripts/*.sh
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-targets --all-features
      - run: cargo test --locked --workspace --doc --all-features
      - run: RUSTDOCFLAGS='-D warnings' cargo doc --locked --workspace --all-features --no-deps
      - name: Validate checked documentation against public surfaces
        run: scripts/validate-documentation.py --cli target/debug/mealyctl
      - name: Verify interactive dashboard against a real daemon
        run: scripts/dashboard-smoke.sh
      - run: packaging/test-packaging.sh
      - name: Install pinned supply-chain tools
        run: |
          cargo install --locked --features cli cargo-about --version 0.9.1
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-auditable --version 0.7.5
      - name: Audit locked dependencies against RustSec
        run: cargo audit --deny warnings
      - name: Build auditable locked release binaries
        run: scripts/build-release-binaries.sh --auditable
      - name: Promote the exact soaked x86_64 daemon
        if: ${{ matrix.target == 'linux-x86_64-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          source="$RUNNER_TEMP/mealy-soak-subject/mealyd"
          expected_sha256=$(jq -er '.assetSha256' \
            docs/benchmarks/release-soak-subject.json)
          expected_bytes=$(jq -er '.assetBytes' \
            docs/benchmarks/release-soak-subject.json)
          test ! -L "$source" && test -f "$source"
          test "$(stat -c '%s' "$source")" = "$expected_bytes"
          test "$(sha256sum "$source" | cut -d ' ' -f 1)" = "$expected_sha256"
          install -m 0755 "$source" target/release/.mealyd.promoted
          test "$(sha256sum target/release/.mealyd.promoted | cut -d ' ' -f 1)" \
            = "$expected_sha256"
          mv -fT target/release/.mealyd.promoted target/release/mealyd
      - name: Audit the exact release binaries
        run: cargo audit bin target/release/mealyd target/release/mealyctl
      - name: Bind the checked 24-hour soak to the exact release daemon
        if: ${{ matrix.target == 'linux-x86_64-gnu' }}
        run: >-
          scripts/validate-release-soak.sh
          docs/benchmarks/release-soak.json
          target/release/mealyd "$GITHUB_SHA"
      - name: Prepare isolated systemd user manager
        shell: bash
        run: |
          set -euo pipefail
          uid=$(id -u)
          sudo loginctl enable-linger "$USER"
          sudo systemctl start "user@${uid}.service"
          echo "XDG_RUNTIME_DIR=/run/user/${uid}" >>"$GITHUB_ENV"
          XDG_RUNTIME_DIR="/run/user/${uid}" systemctl --user show-environment >/dev/null
      - name: Verify exact release service through an approved mutation
        env:
          MEALY_SYSTEMD_SMOKE_ALLOW_HOST: 'true'
        run: scripts/systemd-service-smoke.sh target/release/mealyd target/release/mealyctl
      - name: Verify exact release can recover a failed installed update
        env:
          MEALY_UPDATE_ROLLBACK_SMOKE_ALLOW_HOST: 'true'
        run: >-
          scripts/installed-update-rollback-smoke.sh
          target/release/mealyd target/release/mealyctl
      - name: Prepare bounded SBOM input
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sbom-input/bin sbom
          install -m 0755 target/release/mealyd sbom-input/bin/mealyd
          install -m 0755 target/release/mealyctl sbom-input/bin/mealyctl
      - name: Generate CycloneDX SBOM from auditable binaries
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: sbom-input
          format: cyclonedx-json
          output-file: sbom/mealy.raw.cdx.json
          artifact-name: mealy-${{ github.ref_name }}-${{ matrix.target }}.cdx.json
          syft-version: v1.49.0
          upload-artifact: false
          upload-release-assets: false
      - name: Normalize reproducible release SBOM identity
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          packaging/normalize-sbom.sh sbom/mealy.raw.cdx.json sbom/mealy.cdx.json \
            "$version" "$MEALY_TARGET" "$GITHUB_SHA" "$SOURCE_DATE_EPOCH"
      - name: Validate release SBOM inventory
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .bomFormat == "CycloneDX"
            and (.components | type == "array" and length > 0)
            and ([.components[].name] | index("mealyd") != null)
            and ([.components[].name] | index("mealyctl") != null)
          ' sbom/mealy.cdx.json >/dev/null
      - name: Generate reproducible third-party license notice
        run: |
          cargo fetch --locked
          scripts/generate-third-party-licenses.sh \
            "$(command -v cargo-about)" third-party-licenses.html
      - name: Build reproducible release archive
        env:
          MEALY_SYSTEMD_SMOKE_ALLOW_HOST: 'true'
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          state_schema_version=$(target/release/mealyd --print-supported-schema-version)
          packaging/build-release.sh "$version" "$MEALY_TARGET" target/release \
            sbom/mealy.cdx.json third-party-licenses.html dist "$GITHUB_SHA" \
            "$SOURCE_DATE_EPOCH" "$state_schema_version"
          packaging/build-deb.sh "$version" "$MEALY_TARGET" \
            "dist/mealy-v${version}-${MEALY_TARGET}.tar.gz" dist/SHA256SUMS dist \
            "$SOURCE_DATE_EPOCH"
          docker run --rm \
            --env HOST_UID="$(id -u)" \
            --env MEALY_VERSION="$version" \
            --env MEALY_TARGET \
            --env SOURCE_DATE_EPOCH \
            --volume "$PWD:/workspace:ro" \
            --volume "$PWD/dist:/dist" \
            "$FEDORA_IMAGE" sh -lc '
              dnf install --assumeyes findutils gzip jq rpm-build tar
              useradd --create-home --home-dir /tmp/builder --non-unique \
                --uid "$HOST_UID" --gid 0 builder
              runuser -u builder -- env HOME=/tmp/builder \
                /workspace/packaging/build-rpm.sh \
                "$MEALY_VERSION" "$MEALY_TARGET" \
                "/dist/mealy-v${MEALY_VERSION}-${MEALY_TARGET}.tar.gz" \
                /dist/SHA256SUMS /dist "$SOURCE_DATE_EPOCH"
            '
          if [[ $MEALY_TARGET == linux-x86_64-gnu ]]; then
            docker run --rm \
              --env HOST_UID="$(id -u)" \
              --env MEALY_VERSION="$version" \
              --env MEALY_TARGET \
              --env SOURCE_DATE_EPOCH \
              --volume "$PWD:/workspace:ro" \
              --volume "$PWD/dist:/dist" \
              "$ARCH_IMAGE" sh -lc '
                pacman -Syu --noconfirm jq
                useradd --create-home --home-dir /tmp/builder --non-unique \
                  --uid "$HOST_UID" --gid 0 builder
                runuser -u builder -- env HOME=/tmp/builder \
                  /workspace/packaging/build-arch-package.sh \
                  "$MEALY_VERSION" "$MEALY_TARGET" \
                  "/dist/mealy-v${MEALY_VERSION}-${MEALY_TARGET}.tar.gz" \
                  /dist/SHA256SUMS /dist "$SOURCE_DATE_EPOCH"
              '
          fi
          (cd dist && sha256sum --check --strict SHA256SUMS)
          package="mealy-v${version}-${MEALY_TARGET}"
          documentation_root="$RUNNER_TEMP/package-documentation-$MEALY_TARGET"
          mkdir "$documentation_root"
          tar -xzf "dist/${package}.tar.gz" -C "$documentation_root"
          scripts/validate-documentation.py --mode package \
            --repository "$documentation_root/$package" \
            --cli "$documentation_root/$package/bin/mealyctl"
          MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true scripts/installed-package-smoke.sh \
            "dist/mealy-v${version}-${MEALY_TARGET}.tar.gz" dist/SHA256SUMS \
            dist/install-mealy.sh
          debian_version=${version/-/~}
          case $MEALY_TARGET in
            linux-x86_64-gnu) debian_architecture=amd64 ;;
            linux-aarch64-gnu) debian_architecture=arm64 ;;
          esac
          lintian --fail-on error,warning \
            "dist/mealy_${debian_version}_${debian_architecture}.deb"
          package_installed=false
          cleanup_service_package() {
            if [[ $package_installed == true ]]; then
              sudo dpkg --purge mealy >/dev/null 2>&1 || true
            fi
          }
          trap cleanup_service_package EXIT
          package_installed=true
          sudo dpkg --install \
            "dist/mealy_${debian_version}_${debian_architecture}.deb" >/dev/null
          scripts/systemd-service-smoke.sh \
            /usr/lib/mealy/release/bin/mealyd /usr/lib/mealy/release/bin/mealyctl
          sudo dpkg --purge mealy >/dev/null
          package_installed=false
          trap - EXIT
          MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true scripts/installed-deb-smoke.sh \
            "dist/mealy_${debian_version}_${debian_architecture}.deb"
          case $MEALY_TARGET in
            linux-x86_64-gnu) rpm_architecture=x86_64 ;;
            linux-aarch64-gnu) rpm_architecture=aarch64 ;;
          esac
          docker run --rm --privileged \
            --volume "$PWD:/workspace:ro" \
            --volume "$PWD/dist:/dist:ro" \
            "$FEDORA_IMAGE" sh -lc "
              dnf install --assumeyes bubblewrap ca-certificates jq libgcc
              MEALY_INSTALLED_SMOKE_ROOT=/tmp \
              MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true \
                /workspace/scripts/installed-rpm-smoke.sh \
                /dist/mealy-${version}-1.${rpm_architecture}.rpm
            "
          if [[ $MEALY_TARGET == linux-x86_64-gnu ]]; then
            docker run --rm --privileged \
              --volume "$PWD:/workspace:ro" \
              --volume "$PWD/dist:/dist:ro" \
              "$ARCH_IMAGE" sh -lc "
                pacman -Syu --noconfirm bubblewrap jq
                MEALY_INSTALLED_SMOKE_ROOT=/tmp \
                MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true \
                  /workspace/scripts/installed-arch-smoke.sh \
                  /dist/mealy-${version}-1-x86_64.pkg.tar.zst
              "
          fi
          mv dist/SHA256SUMS "dist/SHA256SUMS-${MEALY_TARGET}"
          rm dist/install-mealy.sh dist/install-mealy-release.sh
      - name: Attest architecture-specific release assets
        id: attest-architecture
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: 'dist/*'
      - name: Retain offline architecture provenance bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest-architecture.outputs.bundle-path }}
        run: >-
          install -m 0644 "$ATTESTATION_BUNDLE"
          "dist/ATTESTATION-${MEALY_TARGET}.sigstore.json"
      - name: Retain architecture-specific workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mealy-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  signed-linux-repositories:
    name: Sign Linux package repositories
    needs: [browser-conformance, linux-packages]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: linux-repository-signing
    permissions:
      contents: read # Read the tagged source and qualified package artifacts.
      id-token: write # Mint the short-lived identity used by actions/attest.
      attestations: write # Publish provenance for the signed repository manifest.
      artifact-metadata: write # Record the manifest subject linked to the attestation.
      pages: write # Read the configured Pages identity before packaging its artifact.
    outputs:
      repository_base_url: ${{ steps.repository-identity.outputs.base_url }}
      repository_fingerprint: ${{ steps.repository-identity.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Require an enabled Pages site
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Validate the public repository identity
        id: repository-identity
        env:
          CONFIGURED_BASE_URL: ${{ vars.MEALY_REPOSITORY_BASE_URL }}
          CONFIGURED_FINGERPRINT: ${{ vars.MEALY_REPOSITORY_GPG_FINGERPRINT }}
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          base_url=${CONFIGURED_BASE_URL%/}
          pages_base_url=${PAGES_BASE_URL%/}
          fingerprint=${CONFIGURED_FINGERPRINT^^}
          if [[ ! $base_url =~ ^https:// \
            || $base_url != "$pages_base_url" \
            || ! $fingerprint =~ ^[0-9A-F]{40}$ ]]; then
            echo "Pages URL or repository signing fingerprint is not configured exactly" >&2
            exit 65
          fi
          printf 'base_url=%s\n' "$base_url" >>"$GITHUB_OUTPUT"
          printf 'fingerprint=%s\n' "$fingerprint" >>"$GITHUB_OUTPUT"
      - name: Download the qualified native packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mealy-${{ github.ref_name }}-linux-*
          path: gathered
          merge-multiple: true
      - name: Build and validate signed package repositories
        env:
          BASE_URL: ${{ steps.repository-identity.outputs.base_url }}
          EXPECTED_FINGERPRINT: ${{ steps.repository-identity.outputs.fingerprint }}
          PRIVATE_KEY_BASE64: ${{ secrets.MEALY_REPOSITORY_GPG_PRIVATE_KEY_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          version=${GITHUB_REF_NAME#v}
          publication_epoch=$(git show -s --format=%ct HEAD)
          private_key="$RUNNER_TEMP/mealy-repository-private-key.asc"
          cleanup_key() {
            rm -f -- "$private_key"
          }
          trap cleanup_key EXIT
          if [[ -z $PRIVATE_KEY_BASE64 ]]; then
            echo "repository signing key is not configured" >&2
            exit 65
          fi
          printf '%s' "$PRIVATE_KEY_BASE64" | base64 --decode >"$private_key"
          packaging/build-signed-linux-repositories.sh \
            "$version" gathered repository "$BASE_URL" "$publication_epoch" \
            "$private_key" "$EXPECTED_FINGERPRINT"
          rm -f -- "$private_key"
          trap - EXIT
          packaging/validate-signed-linux-repositories.sh \
            repository "$BASE_URL" "$EXPECTED_FINGERPRINT"
      - name: Attest the signed repository manifest
        id: attest-repository
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: repository/REPOSITORY-MANIFEST.json
      - name: Retain offline repository provenance bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest-repository.outputs.bundle-path }}
        run: >-
          install -m 0644 "$ATTESTATION_BUNDLE"
          "$RUNNER_TEMP/ATTESTATION-linux-repositories.sigstore.json"
      - name: Retain repository provenance for release publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mealy-linux-repository-provenance-${{ github.run_id }}
          path: ${{ runner.temp }}/ATTESTATION-linux-repositories.sigstore.json
          if-no-files-found: error
          retention-days: 30
      - name: Upload the exact signed Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: repository
          retention-days: 1

  publish:
    name: Validate and publish release
    needs: [browser-conformance, linux-packages, signed-linux-repositories]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read       # Bind release notes to the exact acceptance workflows.
      contents: write      # Create the immutable GitHub release from verified assets.
      id-token: write      # Mint the short-lived identity used by actions/attest.
      attestations: write  # Publish the common-installer attestations.
      artifact-metadata: write # Record the subjects linked to each attestation.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download all architecture-specific assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mealy-${{ github.ref_name }}-*
          path: gathered
          merge-multiple: true
      - name: Download signed-repository provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mealy-linux-repository-provenance-${{ github.run_id }}
          path: repository-provenance
      - name: Validate complete release inventory and checksums
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          packaging/assemble-release.sh "$version" gathered dist
          install -m 0644 \
            repository-provenance/ATTESTATION-linux-repositories.sigstore.json \
            dist/ATTESTATION-linux-repositories.sigstore.json
      - name: Attest common installers
        id: attest-installers
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: 'dist/install-mealy*.sh'
      - name: Retain offline installer provenance bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest-installers.outputs.bundle-path }}
        run: >-
          install -m 0644 "$ATTESTATION_BUNDLE"
          dist/ATTESTATION-installers.sigstore.json
      - name: Retain complete release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mealy-${{ github.ref_name }}-release-assets
          path: dist/*
          if-no-files-found: error
          retention-days: 30
      - name: Revalidate the remote tag and publish the immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_create_help=$(gh release create --help)
          grep -Fq 'separate API calls' <<<"$release_create_help"
          gh release verify --help >/dev/null
          ref=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")
          object_type=$(jq -er '.object.type' <<<"$ref")
          object_sha=$(jq -er '.object.sha' <<<"$ref")
          for _ in {1..8}; do
            if [[ $object_type == commit ]]; then
              break
            fi
            if [[ $object_type != tag ]]; then
              echo "release tag does not resolve to a commit" >&2
              exit 65
            fi
            tag=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}")
            object_type=$(jq -er '.object.type' <<<"$tag")
            object_sha=$(jq -er '.object.sha' <<<"$tag")
          done
          if [[ $object_type != commit || $object_sha != "$GITHUB_SHA" ]]; then
            echo "remote release tag no longer resolves to the built commit" >&2
            exit 65
          fi
          ci_runs=$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f branch=main \
            -f event=push \
            -f status=success \
            -F per_page=100)
          ci_runs_file="$RUNNER_TEMP/mealy-protected-ci-runs.json"
          printf '%s\n' "$ci_runs" >"$ci_runs_file"
          ci_run_url=$(scripts/select-protected-ci-run.sh \
            "$ci_runs_file" "$GITHUB_SHA" "$GITHUB_REPOSITORY" \
            "$GITHUB_SERVER_URL")
          runs=$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/live-smoke.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f event=workflow_dispatch \
            -f status=success \
            -F per_page=100)
          runs_file="$RUNNER_TEMP/mealy-live-provider-runs.json"
          printf '%s\n' "$runs" >"$runs_file"
          live_run_url=$(scripts/select-live-provider-acceptance.sh \
            "$runs_file" "$GITHUB_SHA" "$GITHUB_REPOSITORY" \
            "$GITHUB_SERVER_URL")
          release_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          scripts/render-release-notes.sh \
            docs/benchmarks/release-soak.json "$GITHUB_REPOSITORY" \
            "$GITHUB_REF_NAME" "$GITHUB_SHA" "$ci_run_url" "$live_run_url" \
            "$release_run_url" \
            "$RUNNER_TEMP/release-notes.md"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag --title "Mealy $GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

  deploy-linux-repositories:
    name: Publish signed Linux repositories
    needs: [publish, signed-linux-repositories]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pages: write # Publish the already signed repository artifact.
      id-token: write # Authenticate the Pages deployment without a stored credential.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the signed repository artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Require the configured public URL
        env:
          ACTUAL_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_URL: ${{ needs.signed-linux-repositories.outputs.repository_base_url }}
        shell: bash
        run: |
          set -euo pipefail
          test "${ACTUAL_URL%/}" = "${EXPECTED_URL%/}"

  public-repository-acceptance:
    name: Verify public ${{ matrix.distribution }} repository
    needs: [deploy-linux-repositories, signed-linux-repositories]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read # Download the release-retained offline repository bundle.
      attestations: read # Verify the public manifest against GitHub provenance.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            distribution: Ubuntu 24.04 x86-64
            family: deb
            image: ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90
          - runner: ubuntu-24.04-arm
            distribution: Debian 13 ARM64
            family: deb
            image: debian:13@sha256:fac46bff2e02f51425b6e33b0e1169f55dfb053d83511ca28aa50c09fd5ed7a4
          - runner: ubuntu-24.04
            distribution: Fedora 44 x86-64
            family: rpm
            image: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
          - runner: ubuntu-24.04-arm
            distribution: Fedora 44 ARM64
            family: rpm
            image: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
          - runner: ubuntu-24.04
            distribution: Arch Linux x86-64
            family: arch
            image: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678
    env:
      MEALY_REPOSITORY_BASE_URL: ${{ needs.signed-linux-repositories.outputs.repository_base_url }}
      MEALY_REPOSITORY_FINGERPRINT: ${{ needs.signed-linux-repositories.outputs.repository_fingerprint }}
      MEALY_REPOSITORY_FAMILY: ${{ matrix.family }}
      MEALY_REPOSITORY_IMAGE: ${{ matrix.image }}
    steps:
      - name: Verify the public signed and attested manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          temporary=$(mktemp -d)
          cleanup() {
            rm -rf -- "$temporary"
          }
          trap cleanup EXIT
          gh release download "$GITHUB_REF_NAME" \
            --pattern ATTESTATION-linux-repositories.sigstore.json \
            --dir "$temporary"
          verified=false
          for _ in {1..60}; do
            rm -rf "$temporary/gnupg"
            mkdir -m 0700 "$temporary/gnupg"
            if curl --fail --location --silent --show-error \
                --proto '=https' --proto-redir '=https' --tlsv1.2 \
                --connect-timeout 20 --max-time 120 \
                "$MEALY_REPOSITORY_BASE_URL/repository-signing-key.asc" \
                --output "$temporary/repository-signing-key.asc" \
              && curl --fail --location --silent --show-error \
                --proto '=https' --proto-redir '=https' --tlsv1.2 \
                --connect-timeout 20 --max-time 120 \
                "$MEALY_REPOSITORY_BASE_URL/REPOSITORY-MANIFEST.json" \
                --output "$temporary/REPOSITORY-MANIFEST.json" \
              && curl --fail --location --silent --show-error \
                --proto '=https' --proto-redir '=https' --tlsv1.2 \
                --connect-timeout 20 --max-time 120 \
                "$MEALY_REPOSITORY_BASE_URL/REPOSITORY-MANIFEST.json.asc" \
                --output "$temporary/REPOSITORY-MANIFEST.json.asc" \
              && gpg --batch --homedir "$temporary/gnupg" \
                --import "$temporary/repository-signing-key.asc" >/dev/null 2>&1 \
              && gpg --batch --homedir "$temporary/gnupg" \
                --verify "$temporary/REPOSITORY-MANIFEST.json.asc" \
                "$temporary/REPOSITORY-MANIFEST.json" >/dev/null 2>&1 \
              && jq -e \
                --arg base_url "$MEALY_REPOSITORY_BASE_URL" \
                --arg fingerprint "$MEALY_REPOSITORY_FINGERPRINT" \
                --arg version "${GITHUB_REF_NAME#v}" '
                  .schemaVersion == "mealy.linux-repositories.v1"
                  and .baseUrl == $base_url
                  and .signingFingerprint == $fingerprint
                  and .version == $version
                ' "$temporary/REPOSITORY-MANIFEST.json" >/dev/null; then
              verified=true
              break
            fi
            sleep 10
          done
          if [[ $verified != true ]]; then
            echo "public signed repository did not converge on the tagged release" >&2
            exit 69
          fi
          actual_fingerprint=$(
            gpg --batch --homedir "$temporary/gnupg" --with-colons --list-keys |
              awk -F: '
                $1 == "pub" {want = 1; next}
                want && $1 == "fpr" {print toupper($10); exit}
              '
          )
          test "$actual_fingerprint" = "$MEALY_REPOSITORY_FINGERPRINT"
          gh attestation verify "$temporary/REPOSITORY-MANIFEST.json" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-ref "refs/tags/$GITHUB_REF_NAME" \
            --source-digest "$GITHUB_SHA" \
            --bundle "$temporary/ATTESTATION-linux-repositories.sigstore.json" \
            --deny-self-hosted-runners >/dev/null
      - name: Install from the public package-manager repository
        shell: bash
        run: |
          set -euo pipefail
          case $MEALY_REPOSITORY_FAMILY in
            deb)
              docker run --rm \
                --env MEALY_REPOSITORY_BASE_URL \
                "$MEALY_REPOSITORY_IMAGE" bash -s <<'DEBIAN'
          set -euo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive \
            apt-get install --yes ca-certificates curl
          curl --fail --location --silent --show-error \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$MEALY_REPOSITORY_BASE_URL/mealy.sources" \
            --output /etc/apt/sources.list.d/mealy.sources
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install --yes mealy
          mealyctl --version
          DEBIAN
              ;;
            rpm)
              docker run --rm \
                --env MEALY_REPOSITORY_BASE_URL \
                "$MEALY_REPOSITORY_IMAGE" bash -s <<'FEDORA'
          set -euo pipefail
          dnf install --assumeyes ca-certificates curl
          curl --fail --location --silent --show-error \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$MEALY_REPOSITORY_BASE_URL/mealy.repo" \
            --output /etc/yum.repos.d/mealy.repo
          dnf --assumeyes install mealy
          mealyctl --version
          FEDORA
              ;;
            arch)
              docker run --rm \
                --env MEALY_REPOSITORY_BASE_URL \
                --env MEALY_REPOSITORY_FINGERPRINT \
                "$MEALY_REPOSITORY_IMAGE" bash -s <<'ARCH'
          set -euo pipefail
          pacman -Syu --noconfirm ca-certificates curl gnupg
          curl --fail --location --silent --show-error \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$MEALY_REPOSITORY_BASE_URL/repository-signing-key.asc" \
            --output /tmp/mealy-repository-signing-key.asc
          curl --fail --location --silent --show-error \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$MEALY_REPOSITORY_BASE_URL/mealy.pacman.conf" \
            --output /tmp/mealy.pacman.conf
          actual=$(
            gpg --batch --show-keys --with-colons \
              /tmp/mealy-repository-signing-key.asc |
              awk -F: '
                $1 == "pub" {want = 1; next}
                want && $1 == "fpr" {print toupper($10); exit}
              '
          )
          test "$actual" = "$MEALY_REPOSITORY_FINGERPRINT"
          pacman-key --init
          pacman-key --add /tmp/mealy-repository-signing-key.asc
          pacman-key --lsign-key "$MEALY_REPOSITORY_FINGERPRINT"
          cat /tmp/mealy.pacman.conf >>/etc/pacman.conf
          pacman --sync --refresh --noconfirm mealy
          mealyctl --version
          ARCH
              ;;
            *)
              echo "unsupported repository family: $MEALY_REPOSITORY_FAMILY" >&2
              exit 64
              ;;
          esac

  public-linux-acceptance:
    name: Verify public Linux install on ${{ matrix.target }}
    needs: publish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      attestations: read # Verify the immutable public release and its downloaded assets.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x86_64-gnu
            debian_architecture: amd64
          - runner: ubuntu-24.04-arm
            target: linux-aarch64-gnu
            debian_architecture: arm64
    env:
      MEALY_TARGET: ${{ matrix.target }}
      MEALY_DEBIAN_ARCHITECTURE: ${{ matrix.debian_architecture }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Prepare clean-host Linux prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes \
            apparmor-profiles apparmor-utils bubblewrap curl jq
          scripts/prepare-bwrap-boundary.sh
          attestation_help=$(gh attestation verify --help)
          grep -Fq -- '--bundle' <<<"$attestation_help"
          grep -Fq -- '--source-digest' <<<"$attestation_help"
          gh release verify --help >/dev/null
      - name: Verify immutable public release and exact native assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          archive="mealy-v${version}-${MEALY_TARGET}.tar.gz"
          checksums="SHA256SUMS-${MEALY_TARGET}"
          deb="mealy_${version}_${MEALY_DEBIAN_ARCHITECTURE}.deb"
          case $MEALY_TARGET in
            linux-x86_64-gnu)
              rpm="mealy-${version}-1.x86_64.rpm"
              arch="mealy-${version}-1-x86_64.pkg.tar.zst"
              ;;
            linux-aarch64-gnu)
              rpm="mealy-${version}-1.aarch64.rpm"
              arch=
              ;;
            *)
              echo "unsupported public Linux release target: $MEALY_TARGET" >&2
              exit 64
              ;;
          esac
          sbom="mealy-v${version}-${MEALY_TARGET}.cdx.json"
          architecture_bundle="ATTESTATION-${MEALY_TARGET}.sigstore.json"
          installer_bundle=ATTESTATION-installers.sigstore.json
          mkdir downloaded
          verified=false
          for _ in {1..60}; do
            if gh release verify "$GITHUB_REF_NAME" --format json \
              >downloaded/release-verification.json 2>downloaded/release-verification.err; then
              verified=true
              break
            fi
            sleep 10
          done
          if [[ $verified != true ]]; then
            cat downloaded/release-verification.err >&2
            exit 70
          fi
          rm downloaded/release-verification.err
          assets=(
            "$archive"
            "$checksums"
            "$deb"
            "$rpm"
            "$sbom"
            "$architecture_bundle"
            install-mealy.sh
            install-mealy-release.sh
            "$installer_bundle"
          )
          if [[ -n $arch ]]; then
            assets+=("$arch")
          fi
          download_arguments=()
          for asset in "${assets[@]}"; do
            download_arguments+=(--pattern "$asset")
          done
          gh release download "$GITHUB_REF_NAME" --dir downloaded \
            "${download_arguments[@]}"
          expected=$(printf '%s\n' "${assets[@]}" release-verification.json | sort)
          actual=$(find downloaded -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          if [[ $actual != "$expected" \
            || -n $(find downloaded -mindepth 1 -maxdepth 1 ! -type f -print -quit) ]]; then
            echo "public Linux release download inventory is not exact" >&2
            exit 65
          fi
          while IFS= read -r asset; do
            gh release verify-asset "$GITHUB_REF_NAME" "downloaded/$asset" >/dev/null
          done < <(printf '%s\n' "${assets[@]}")
          gh attestation verify "downloaded/$checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-ref "refs/tags/$GITHUB_REF_NAME" \
            --source-digest "$GITHUB_SHA" \
            --bundle "downloaded/$architecture_bundle" \
            --deny-self-hosted-runners >/dev/null
          (cd downloaded && sha256sum --check --strict "$checksums")
      - name: Exercise the public tokenless rootless bootstrap
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          temporary=$(mktemp -d "$HOME/mealy-public-bootstrap.XXXXXX")
          trap 'rm -rf -- "$temporary"' EXIT
          mkdir "$temporary/gh-config"
          gh attestation verify downloaded/install-mealy-release.sh \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-ref "refs/tags/$GITHUB_REF_NAME" \
            --source-digest "$GITHUB_SHA" \
            --bundle downloaded/ATTESTATION-installers.sigstore.json \
            --deny-self-hosted-runners >/dev/null
          chmod 0755 downloaded/install-mealy-release.sh
          GH_CONFIG_DIR="$temporary/gh-config" \
            env -u GH_TOKEN -u GITHUB_TOKEN downloaded/install-mealy-release.sh \
            --version "$GITHUB_REF_NAME" --repository "$GITHUB_REPOSITORY" \
            --prefix "$temporary/prefix" --home "$temporary/home" --no-onboard
          test "$("$temporary/prefix/bin/mealyd" --version)" = "mealyd $version"
          test "$("$temporary/prefix/bin/mealyctl" --version)" = "mealyctl $version"
          mkdir -m 0700 "$temporary/home"
          "$temporary/prefix/bin/mealyctl" --home "$temporary/home" service install \
            --destination "$temporary/mealy.service" >"$temporary/service.json"
          jq -e --arg daemon "$temporary/prefix/bin/mealyd" '
            .platform == "linux-systemd-user"
            and .daemonPath == $daemon
            and (.activationCommand | contains("systemctl --user"))
          ' "$temporary/service.json" >/dev/null
          "$temporary/prefix/share/mealy-manager.sh" uninstall \
            --prefix "$temporary/prefix" --home "$temporary/home" >/dev/null
          test ! -e "$temporary/prefix/bin/mealyd"
      - name: Re-run exact downloaded archive and Debian lifecycle smokes
        env:
          MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX: 'true'
        shell: bash
        run: |
          set -euo pipefail
          version=${GITHUB_REF_NAME#v}
          chmod 0755 downloaded/install-mealy.sh
          package="mealy-v${version}-${MEALY_TARGET}"
          mkdir extracted
          tar -xzf "downloaded/${package}.tar.gz" -C extracted
          (cd "extracted/$package" && sha256sum --check --strict PAYLOAD-SHA256SUMS)
          scripts/validate-documentation.py --mode package \
            --repository "extracted/$package" \
            --cli "extracted/$package/bin/mealyctl"
          scripts/installed-package-smoke.sh \
            "downloaded/mealy-v${version}-${MEALY_TARGET}.tar.gz" \
            "downloaded/SHA256SUMS-${MEALY_TARGET}" \
            downloaded/install-mealy.sh
          scripts/installed-deb-smoke.sh \
            "downloaded/mealy_${version}_${MEALY_DEBIAN_ARCHITECTURE}.deb"

  public-distro-acceptance:
    name: Verify public ${{ matrix.distribution }} package
    needs: publish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
