            image: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678
    env:
      MEALY_TARGET: ${{ matrix.target }}
      MEALY_PACKAGE_ARCHITECTURE: ${{ matrix.package_architecture }}
      MEALY_PACKAGE_FAMILY: ${{ matrix.family }}
      MEALY_TEST_IMAGE: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Download and verify the public native package
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          attestation_help=$(gh attestation verify --help)
          grep -Fq -- '--bundle' <<<"$attestation_help"
          grep -Fq -- '--source-digest' <<<"$attestation_help"
          version=${GITHUB_REF_NAME#v}
          checksums="SHA256SUMS-${MEALY_TARGET}"
          case $MEALY_PACKAGE_FAMILY in
            deb) package="mealy_${version}_${MEALY_PACKAGE_ARCHITECTURE}.deb" ;;
            rpm) package="mealy-${version}-1.${MEALY_PACKAGE_ARCHITECTURE}.rpm" ;;
            arch) package="mealy-${version}-1-x86_64.pkg.tar.zst" ;;
            *)
              echo "unsupported package family: $MEALY_PACKAGE_FAMILY" >&2
              exit 64
              ;;
          esac
          architecture_bundle="ATTESTATION-${MEALY_TARGET}.sigstore.json"
          mkdir downloaded
          gh release download "$GITHUB_REF_NAME" --dir downloaded \
            --pattern "$checksums" \
            --pattern "$package" \
            --pattern "$architecture_bundle"
          expected=$(printf '%s\n' "$checksums" "$package" "$architecture_bundle" | sort)
          actual=$(find downloaded -mindepth 1 -maxdepth 1 -type f -exec basename {} \; | sort)
          if [[ $actual != "$expected" \
            || -n $(find downloaded -mindepth 1 -maxdepth 1 ! -type f -print -quit) ]]; then
            echo "public native package download inventory is not exact" >&2
            exit 65
          fi
          while IFS= read -r asset; do
            gh release verify-asset "$GITHUB_REF_NAME" "downloaded/$asset" >/dev/null
          done < <(printf '%s\n' "$checksums" "$package" "$architecture_bundle")
          gh attestation verify "downloaded/$checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-ref "refs/tags/$GITHUB_REF_NAME" \
            --source-digest "$GITHUB_SHA" \
            --bundle "downloaded/$architecture_bundle" \
            --deny-self-hosted-runners >/dev/null
          grep -F "  $package" "downloaded/$checksums" >downloaded/PACKAGE-SHA256SUMS
          (cd downloaded && sha256sum --check --strict PACKAGE-SHA256SUMS)
          printf 'MEALY_PUBLIC_PACKAGE=%s\n' "$package" >>"$GITHUB_ENV"
      - name: Exercise the public native package on its distribution
        shell: bash
        run: |
          set -euo pipefail
          case $MEALY_PACKAGE_FAMILY in
            deb)
              setup='apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install --yes bubblewrap ca-certificates jq
                export MEALY_INSTALLED_SMOKE_ROOT=/tmp
                export MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true
                /source/scripts/installed-deb-smoke.sh "/assets/'"$MEALY_PUBLIC_PACKAGE"'"'
              ;;
            rpm)
              setup='dnf install --assumeyes bubblewrap ca-certificates jq libgcc
                export MEALY_INSTALLED_SMOKE_ROOT=/tmp
                export MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true
                /source/scripts/installed-rpm-smoke.sh "/assets/'"$MEALY_PUBLIC_PACKAGE"'"'
              ;;
            arch)
              setup='pacman -Syu --noconfirm bubblewrap ca-certificates jq
                export MEALY_INSTALLED_SMOKE_ROOT=/tmp
                export MEALY_INSTALLED_SMOKE_REQUIRE_SANDBOX=true
                /source/scripts/installed-arch-smoke.sh "/assets/'"$MEALY_PUBLIC_PACKAGE"'"'
              ;;
          esac
          docker run --rm --privileged \
            --mount type=bind,src="$PWD",dst=/source,readonly \
            --mount type=bind,src="$PWD/downloaded",dst=/assets,readonly \
            --workdir /source \
            "$MEALY_TEST_IMAGE" bash -euo pipefail -c "$setup"
