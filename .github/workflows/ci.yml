name: mealy-ci

run-name: 'Mealy CI: ${{ github.event_name }} @ ${{ github.sha }}'

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: mealy-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: '0'

jobs:
  quality:
    name: Strict workspace gate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: rustup show
      - name: Prepare Bubblewrap boundary
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils binutils bubblewrap curl jq shellcheck
          scripts/prepare-bwrap-boundary.sh
      - run: cargo fmt --all -- --check
      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --silent --show-error \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --connect-timeout 20 --max-time 120 --max-redirs 5 \
            --max-filesize 2353908 \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            --output "$archive"
          test "$(stat -c '%s' "$archive")" -eq 2353908
          echo '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz' \
            | (cd "$RUNNER_TEMP" && sha256sum --check --strict)
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color
          zizmor=$(scripts/fetch-zizmor.sh "$RUNNER_TEMP/zizmor")
          "$zizmor" --offline --persona auditor --min-severity low \
            --color never --show-audit-urls always .github/workflows
          cargo_deny=$(scripts/fetch-cargo-deny.sh "$RUNNER_TEMP/cargo-deny")
          "$cargo_deny" check
      - name: Validate embedded dashboard JavaScript
        shell: bash
        run: >-
          sed -n '/<script nonce=/,/<\/script>/p' apps/mealyctl/assets/dashboard.html |
          sed '1d;$d' | node --check
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-targets --all-features
      - name: Verify interactive dashboard against a real daemon
        run: scripts/dashboard-smoke.sh
      - run: cargo test --locked --workspace --doc --all-features
      - run: RUSTDOCFLAGS='-D warnings' cargo doc --locked --workspace --all-features --no-deps
      - name: Validate checked documentation against public surfaces
        run: |
          scripts/validate-documentation.py --cli target/debug/mealyctl
          scripts/test-documentation-validator.sh target/debug/mealyctl
      - name: Audit locked dependencies against RustSec
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo audit --deny warnings
      - name: Generate reproducible third-party license notice
        run: |
          cargo install --locked --features cli cargo-about --version 0.9.1
          cargo fetch --locked
          scripts/generate-third-party-licenses.sh \
            "$(command -v cargo-about)" "$RUNNER_TEMP/THIRD-PARTY-LICENSES.html"
      - name: Validate shell entry points
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            packaging/assemble-release.sh
            packaging/build-arch-package.sh
            packaging/build-deb.sh
            packaging/build-rpm.sh
            packaging/build-release.sh
            packaging/build-signed-linux-repositories.sh
            packaging/install.sh
            packaging/install-release.sh
            packaging/normalize-sbom.sh
            packaging/test-arch-packaging.sh
            packaging/test-packaging.sh
            packaging/test-deb-packaging.sh
            packaging/test-rpm-packaging.sh
            packaging/test-signed-linux-repositories.sh
            packaging/validate-signed-linux-repositories.sh
            packaging/verify-release-payload.sh
            scripts/dashboard-smoke.sh
            scripts/build-release-binaries.sh
            scripts/fetch-browser-runtime.sh
            scripts/fetch-cargo-deny.sh
            scripts/fetch-zizmor.sh
            scripts/generate-third-party-licenses.sh
            scripts/installed-package-smoke.sh
            scripts/installed-update-rollback-smoke.sh
            scripts/installed-arch-smoke.sh
            scripts/installed-deb-smoke.sh
            scripts/installed-rpm-smoke.sh
            scripts/render-release-notes.sh
            scripts/run-soak.sh
            scripts/select-live-provider-acceptance.sh
            scripts/select-protected-ci-run.sh
            scripts/systemd-service-smoke.sh
            scripts/system-package-runtime-smoke.sh
            scripts/test-live-provider-acceptance-selector.sh
            scripts/test-documentation-validator.sh
            scripts/test-protected-ci-run-selector.sh
            scripts/test-public-license-validator.sh
            scripts/test-release-notes.sh
            scripts/test-release-soak-validator.sh
            scripts/test-release-tag-validator.sh
            scripts/validate-public-license.sh
            scripts/validate-release-soak.sh
            scripts/validate-release-tag.sh
          )
          bash -n "${scripts[@]}"
          shellcheck "${scripts[@]}"
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/pycache" \
            python3 -m py_compile \
              scripts/validate-documentation.py
      - name: Verify stable production release tag gate
        run: scripts/test-release-tag-validator.sh
      - name: Verify release-soak evidence gate
        run: scripts/test-release-soak-validator.sh
      - name: Verify exact soak-subject promotion gate
        run: scripts/test-release-soak-subject-fetch.sh
      - name: Verify exact free-provider acceptance gate
        run: scripts/test-live-provider-acceptance-selector.sh
      - name: Verify exact protected-main CI gate
        run: scripts/test-protected-ci-run-selector.sh
      - name: Verify public-release license gate
        run: scripts/test-public-license-validator.sh
      - name: Verify deterministic release notes
        run: scripts/test-release-notes.sh
      - run: packaging/test-packaging.sh
      - run: packaging/test-deb-packaging.sh

  control-plane-portability:
    name: Control plane (${{ matrix.os }})
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: rustup show
      - run: cargo check --locked --workspace --all-targets --all-features
      - run: cargo test --locked -p mealyctl --bin mealyctl --all-features

  linux-distro-packages:
    name: Linux package (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04-x86_64
            runner: ubuntu-24.04
            family: deb
            image: ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90
          - name: ubuntu-26.04-x86_64
            runner: ubuntu-24.04
            family: deb
            image: ubuntu:26.04@sha256:3131b4cc82a783df6c9df078f86e01819a13594b865c2cad47bd1bca2b7063bb
          - name: debian-13-x86_64
            runner: ubuntu-24.04
            family: deb
            image: debian:13@sha256:fac46bff2e02f51425b6e33b0e1169f55dfb053d83511ca28aa50c09fd5ed7a4
          - name: fedora-44-x86_64
            runner: ubuntu-24.04
            family: rpm
            image: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
          - name: arch-rolling-x86_64
            runner: ubuntu-24.04
            family: arch
            image: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678
          - name: ubuntu-24.04-arm64
            runner: ubuntu-24.04-arm
            family: deb
            image: ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90
          - name: ubuntu-26.04-arm64
            runner: ubuntu-24.04-arm
            family: deb
            image: ubuntu:26.04@sha256:3131b4cc82a783df6c9df078f86e01819a13594b865c2cad47bd1bca2b7063bb
          - name: debian-13-arm64
            runner: ubuntu-24.04-arm
            family: deb
            image: debian:13@sha256:fac46bff2e02f51425b6e33b0e1169f55dfb053d83511ca28aa50c09fd5ed7a4
          - name: fedora-44-arm64
            runner: ubuntu-24.04-arm
            family: rpm
            image: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Verify Debian-family package
        if: ${{ matrix.family == 'deb' }}
        env:
          IMAGE: ${{ matrix.image }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --volume "$PWD:/workspace:ro" "$IMAGE" sh -lc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install --yes binutils jq
            /workspace/packaging/test-deb-packaging.sh
          '
      - name: Verify Fedora RPM
        if: ${{ matrix.family == 'rpm' }}
        env:
          IMAGE: ${{ matrix.image }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --volume "$PWD:/workspace:ro" "$IMAGE" sh -lc '
            dnf install --assumeyes cpio findutils gzip jq rpm-build tar
            /workspace/packaging/test-rpm-packaging.sh
          '
      - name: Verify Arch package
        if: ${{ matrix.family == 'arch' }}
        env:
          IMAGE: ${{ matrix.image }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --volume "$PWD:/workspace:ro" "$IMAGE" sh -lc '
            pacman -Syu --noconfirm jq
            useradd --create-home --uid 1000 builder
            runuser -u builder -- /workspace/packaging/test-arch-packaging.sh
          '

  linux-repository-trust:
    name: Linux repository trust
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build, verify, and clean-install signed repositories
        run: packaging/test-signed-linux-repositories.sh

  linux-distribution-compatibility:
    name: Linux distribution compatibility
    if: ${{ always() }}
    needs: [linux-distro-packages, linux-repository-trust]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every qualified distribution and repository lane
        env:
          PACKAGE_RESULT: ${{ needs.linux-distro-packages.result }}
          REPOSITORY_RESULT: ${{ needs.linux-repository-trust.result }}
        run: test "$PACKAGE_RESULT" = success && test "$REPOSITORY_RESULT" = success

  linux-sandbox-conformance:
    name: Linux sandbox conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: rustup show
      - name: Prepare Bubblewrap boundary
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils bubblewrap jq
          scripts/prepare-bwrap-boundary.sh
      - run: cargo test --locked -p mealy-infrastructure --all-features --test sandbox_executor
      - name: Prepare isolated systemd user manager
        shell: bash
        run: |
          set -euo pipefail
          uid=$(id -u)
          sudo loginctl enable-linger "$USER"
          sudo systemctl start "user@${uid}.service"
          echo "XDG_RUNTIME_DIR=/run/user/${uid}" >>"$GITHUB_ENV"
          XDG_RUNTIME_DIR="/run/user/${uid}" systemctl --user show-environment >/dev/null
      - name: Verify generated service through an approved mutation
        env:
          MEALY_SYSTEMD_SMOKE_ALLOW_HOST: 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked -p mealyd -p mealyctl
          set +e
          guard_output=$(env -u MEALY_SYSTEMD_SMOKE_ALLOW_HOST \
            scripts/systemd-service-smoke.sh target/debug/mealyd target/debug/mealyctl 2>&1)
          guard_status=$?
          set -e
          test "$guard_status" -eq 73
          grep -Fq 'refusing to mutate a non-isolated systemd user manager' <<<"$guard_output"
          scripts/systemd-service-smoke.sh target/debug/mealyd target/debug/mealyctl
      - name: Verify installed update failure restores the prior release
        env:
          MEALY_UPDATE_ROLLBACK_SMOKE_ALLOW_HOST: 'true'
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-release-binaries.sh
          scripts/installed-update-rollback-smoke.sh \
            target/release/mealyd target/release/mealyctl

  linux-browser-conformance:
    name: Linux rendered-browser conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: rustup show
      - name: Prepare Bubblewrap and pinned Chrome Headless Shell
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes \
            apparmor-profiles apparmor-utils bubblewrap curl fonts-liberation \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libdbus-1-3 libexpat1 libgbm1 libglib2.0-0t64 libnspr4 libnss3 libudev1 \
            libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxkbcommon0 libxrandr2 unzip
          scripts/prepare-bwrap-boundary.sh
          browser_bundle=$(scripts/fetch-browser-runtime.sh "$RUNNER_TEMP/mealy-browser")
          echo "MEALY_BROWSER_BUNDLE=$browser_bundle" >>"$GITHUB_ENV"
      - name: Verify isolated browser process and network boundary
        run: >-
          cargo test --locked -p mealy-infrastructure --all-features
          --test browser_runtime -- --ignored
      - name: Verify model-visible browser, evidence, and replay boundary
        run: >-
          cargo test --locked -p mealyd --all-features --test real_provider
          configured_browser_is_rendered_isolated_cited_and_replays_without_live_chrome
          -- --ignored
      - name: Verify stopped-home browser configuration lifecycle
        run: >-
          cargo test --locked -p mealyctl --all-features --test browser_configuration
          -- --ignored
