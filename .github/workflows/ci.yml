name: mealy-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Strict workspace gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  control-plane-portability:
    name: Control plane (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo check --workspace --all-targets

  linux-sandbox-conformance:
    name: Linux sandbox conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: sudo apt-get update && sudo apt-get install --yes bubblewrap
      - run: cargo test -p mealy-infrastructure --test sandbox_executor
