name: mealy-live-provider-smoke

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Remote provider adapter to exercise
        required: true
        default: openrouter-free
        type: choice
        options:
          - openrouter-free
          - private-responses
          - openai
          - anthropic
      model:
        description: Exact model ID for private/direct probes; ignored for OpenRouter free
        required: false
        type: string
      context_tokens:
        description: Verified context limit for private/direct probes; discovered for OpenRouter free
        required: false
        type: string
      input_price:
        description: Input price for direct OpenAI/Anthropic; fixed to zero for OpenRouter free
        required: false
        type: string
      output_price:
        description: Output price for direct OpenAI/Anthropic; fixed to zero for OpenRouter free
        required: false
        type: string
      run_brave_search:
        description: Also exercise Brave Search using BRAVE_SEARCH_API_KEY
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: mealy-live-provider-smoke
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: '0'

jobs:
  live-provider:
    name: Live ${{ inputs.provider }} adapter
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: live-provider-smoke
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: rustup show
      - name: Prepare Bubblewrap boundary
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils bubblewrap jq
          scripts/prepare-bwrap-boundary.sh
      - name: Build exact release binaries
        run: scripts/build-release-binaries.sh
      - name: Verify public credentialless fetch
        run: >-
          cargo test --locked -p mealy-infrastructure --all-features --test web_live
          public_https_fetch_is_pinned_bounded_sanitized_and_cited
          -- --ignored --exact --nocapture
      - name: Verify optional live Brave Search
        if: ${{ inputs.run_brave_search }}
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: >-
          cargo test --locked -p mealy-infrastructure --all-features --test web_live
          live_brave_search_is_credential_scoped_bounded_and_cited
          -- --ignored --exact --nocapture
      - name: Probe, run, settle, replay, and drain live provider
        shell: bash
        env:
          LIVE_PROVIDER: ${{ inputs.provider }}
          LIVE_MODEL: ${{ inputs.model }}
          LIVE_CONTEXT_TOKENS: ${{ inputs.context_tokens }}
          LIVE_INPUT_PRICE: ${{ inputs.input_price }}
          LIVE_OUTPUT_PRICE: ${{ inputs.output_price }}
          MEALY_OPENAI_LIVE_API_KEY: ${{ inputs.provider == 'openai' && secrets.OPENAI_API_KEY || '' }}
          MEALY_ANTHROPIC_LIVE_API_KEY: ${{ inputs.provider == 'anthropic' && secrets.ANTHROPIC_API_KEY || '' }}
          MEALY_OPENROUTER_LIVE_API_KEY: ${{ inputs.provider == 'openrouter-free' && secrets.OPENROUTER_API_KEY || '' }}
          MEALY_PRIVATE_LIVE_API_KEY: ${{ inputs.provider == 'private-responses' && secrets.LOCAL_API_KEY || '' }}
        run: |
          set -euo pipefail
          home="$RUNNER_TEMP/mealy-live-home"
          daemon_stdout="$RUNNER_TEMP/mealy-live-daemon.stdout"
          daemon_stderr="$RUNNER_TEMP/mealy-live-daemon.stderr"
          daemon_pid=
          cleanup() {
            if [[ -n $daemon_pid ]]; then
              kill "$daemon_pid" 2>/dev/null || true
              wait "$daemon_pid" 2>/dev/null || true
            fi
            rm -rf -- "$home" "$RUNNER_TEMP/mealy-live-workspace"
          }
          trap cleanup EXIT
          case $LIVE_PROVIDER in
            openai) MEALY_LIVE_API_KEY=$MEALY_OPENAI_LIVE_API_KEY ;;
            anthropic) MEALY_LIVE_API_KEY=$MEALY_ANTHROPIC_LIVE_API_KEY ;;
            openrouter-free) MEALY_LIVE_API_KEY=$MEALY_OPENROUTER_LIVE_API_KEY ;;
            private-responses) MEALY_LIVE_API_KEY=$MEALY_PRIVATE_LIVE_API_KEY ;;
            *) echo "unsupported live provider selection" >&2; exit 64 ;;
          esac
          unset MEALY_OPENAI_LIVE_API_KEY MEALY_ANTHROPIC_LIVE_API_KEY \
            MEALY_OPENROUTER_LIVE_API_KEY MEALY_PRIVATE_LIVE_API_KEY
          export MEALY_LIVE_API_KEY
          credential=$MEALY_LIVE_API_KEY
          if [[ -z $credential ]]; then
            echo "the selected live-provider-smoke environment secret is absent" >&2
            exit 78
          fi
          contains_credential() {
            grep -Fq -f <(printf '%s\n' "$credential") -- "$@"
          }
          base_url_args=()
          if [[ $LIVE_PROVIDER == openrouter-free ]]; then
            catalog="$RUNNER_TEMP/mealy-live-openrouter-catalog.json"
            target/release/mealyctl --home "$home" config provider-models-openrouter \
              --credential-env MEALY_LIVE_API_KEY --limit 500 >"$catalog"
            if contains_credential "$catalog"; then
              echo "provider credential appeared in the OpenRouter catalog" >&2
              exit 70
            fi
            selected=$(jq -cer '
              [.models[] | select(
                (.id | endswith(":free"))
                and .toolCapable == true
                and .pricingComplete == true
                and .tokenLimitsComplete == true
                and .inputMicrounitsPerMillionTokens == 0
                and .outputMicrounitsPerMillionTokens == 0
                and (.unsupportedPricingAxes | type == "array" and length == 0)
                and (.contextTokens | type == "number" and . > 256)
                and (.maximumOutputTokens | type == "number" and . >= 256)
              )] | sort_by(.id) | first
            ' "$catalog")
            LIVE_MODEL=$(jq -er '.id' <<<"$selected")
            LIVE_CONTEXT_TOKENS=$(jq -er '.contextTokens' <<<"$selected")
            LIVE_INPUT_PRICE=$(jq -er '.inputMicrounitsPerMillionTokens' <<<"$selected")
            LIVE_OUTPUT_PRICE=$(jq -er '.outputMicrounitsPerMillionTokens' <<<"$selected")
            [[ $LIVE_MODEL == *:free ]]
            [[ $LIVE_INPUT_PRICE == 0 && $LIVE_OUTPUT_PRICE == 0 ]]
            LIVE_PROVIDER=openrouter
          elif [[ $LIVE_PROVIDER == private-responses ]]; then
            if [[ ! $LIVE_CONTEXT_TOKENS =~ ^[1-9][0-9]*$ || -z $LIVE_MODEL ]]; then
              echo "private provider model and verified context limit are required" >&2
              exit 64
            fi
            LIVE_INPUT_PRICE=0
            LIVE_OUTPUT_PRICE=0
            LIVE_PROVIDER=openai
            base_url_args=(--base-url https://the-beast.taile6fad0.ts.net/v1)
          elif [[ ! $LIVE_CONTEXT_TOKENS =~ ^[1-9][0-9]*$ \
            || ! $LIVE_INPUT_PRICE =~ ^[0-9]+$ \
            || ! $LIVE_OUTPUT_PRICE =~ ^[0-9]+$ \
            || -z $LIVE_MODEL ]]; then
            echo "direct-provider model, limit, and price inputs are required" >&2
            exit 64
          fi
          target/release/mealyctl --home "$home" setup \
            --provider "$LIVE_PROVIDER" \
            "${base_url_args[@]}" \
            --model "$LIVE_MODEL" \
            --context-tokens "$LIVE_CONTEXT_TOKENS" \
            --maximum-output-tokens 256 \
            --credential-env MEALY_LIVE_API_KEY \
            --input-microunits-per-million-tokens "$LIVE_INPUT_PRICE" \
            --output-microunits-per-million-tokens "$LIVE_OUTPUT_PRICE" \
            --approve >"$RUNNER_TEMP/mealy-live-setup.json"
          if contains_credential "$RUNNER_TEMP/mealy-live-setup.json" "$home/config.json"; then
            echo "provider credential escaped the broker during setup" >&2
            exit 70
          fi
          workspace="$RUNNER_TEMP/mealy-live-workspace"
          mkdir -p "$workspace"
          printf 'LIVE_PROVIDER_EVIDENCE: model, tool, settlement, and replay boundary.\n' \
            >"$workspace/evidence.txt"
          target/release/mealyctl --home "$home" config workspace-grant \
            live-smoke "$workspace" --approve >"$RUNNER_TEMP/mealy-live-workspace.json"
          unset MEALY_LIVE_API_KEY
          target/release/mealyd --home "$home" \
            --promotion-interval-ms 10 --agent-delay-ms 10 --outbox-delay-ms 0 \
            >"$daemon_stdout" 2>"$daemon_stderr" &
          daemon_pid=$!
          for _ in $(seq 1 400); do
            if [[ -s $home/connection.json ]] \
              && target/release/mealyctl --home "$home" health >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$daemon_pid" 2>/dev/null; then
              echo "live-provider daemon exited before health" >&2
              exit 70
            fi
            sleep 0.05
          done
          target/release/mealyctl --home "$home" doctor >"$RUNNER_TEMP/mealy-live-doctor.json"
          jq -e '.controlPlaneReady == true and .sandboxAvailable == true' \
            "$RUNNER_TEMP/mealy-live-doctor.json" >/dev/null
          session=$(target/release/mealyctl --home "$home" session create)
          session_id=$(jq -er '.sessionId' <<<"$session")
          marker="Live provider smoke $session_id: use workspace.read with workspaceId live-smoke and path evidence.txt, then cite workspace://live-smoke/evidence.txt and briefly report its LIVE_PROVIDER_EVIDENCE canary."
          target/release/mealyctl --home "$home" session send "$session_id" "$marker" \
            --idempotency-key live-provider-smoke-1 >"$RUNNER_TEMP/mealy-live-admission.json"
          admission_cursor=$(jq -er '.cursor' "$RUNNER_TEMP/mealy-live-admission.json")
          timeline="$RUNNER_TEMP/mealy-live-promotion.ndjson"
          if ! timeout 30s target/release/mealyctl --home "$home" session watch \
            "$session_id" --after "$admission_cursor" --limit 2 >"$timeline"; then
            echo "live provider did not promote the admitted input within 30 seconds" >&2
            exit 70
          fi
          if ! task_id=$(jq -er \
            'select(.eventType == "task.created") | .aggregateId' "$timeline"); then
            echo "live provider promotion did not publish the expected task.created event" >&2
            jq -s '[.[] | {cursor, aggregateKind, eventType}]' "$timeline" >&2
            exit 70
          fi
          status=
          for _ in $(seq 1 3000); do
            task=$(target/release/mealyctl --home "$home" task status "$task_id")
            status=$(jq -r '.status' <<<"$task")
            if [[ $status == succeeded || $status == failed || $status == cancelled ]]; then
              break
            fi
            sleep 0.1
          done
          if [[ $status != succeeded && $status != failed && $status != cancelled ]]; then
            echo "live provider task did not become terminal within 300 seconds" >&2
            exit 70
          fi
          printf '%s\n' "$task" >"$RUNNER_TEMP/mealy-live-task.json"
          if [[ $status != succeeded ]]; then
            jq '{taskId, status, modelAttempts, toolCalls, usage}' \
              "$RUNNER_TEMP/mealy-live-task.json" >&2
            failure_timeline="$RUNNER_TEMP/mealy-live-failure.ndjson"
            watch_status=0
            timeout 2s stdbuf -oL target/release/mealyctl --home "$home" session watch \
              "$session_id" --after "$admission_cursor" >"$failure_timeline" \
              || watch_status=$?
            if [[ $watch_status -ne 0 && $watch_status -ne 124 ]]; then
              echo "live provider failure timeline could not be read" >&2
            elif contains_credential "$failure_timeline"; then
              echo "live provider failure summary was redacted" >&2
            else
              jq -rs '{failureSummary: (
                [.[] | select(.eventType == "run.failed") | .payload.summary
                  | select(type == "string" and length > 0)] | last // "unavailable"
              )}' "$failure_timeline" >&2
            fi
            exit 70
          fi
          if ! jq -e '
            .status == "succeeded"
            and (.finalResponse | type == "string" and length > 0)
            and (.finalResponse | contains("workspace://live-smoke/evidence.txt"))
            and .modelAttempts >= 2
            and .toolCalls >= 1
            and .usage.usedModelCalls >= 1
            and .usage.usedToolCalls >= 1
            and .usage.reservedModelCalls == 0
            and .usage.reservedToolCalls == 0
            and .usage.reservedCostMicrounits == 0
          ' "$RUNNER_TEMP/mealy-live-task.json" >/dev/null; then
            jq '{
              taskId,
              status,
              modelAttempts,
              toolCalls,
              usage,
              hasFinalResponse: (.finalResponse | type == "string" and length > 0),
              hasExpectedCitation: (
                .finalResponse | type == "string"
                and contains("workspace://live-smoke/evidence.txt")
              )
            }' "$RUNNER_TEMP/mealy-live-task.json" >&2
            exit 70
          fi
          target/release/mealyctl --home "$home" task replay "$task_id" \
            >"$RUNNER_TEMP/mealy-live-replay.json"
          jq -e '
            .mode == "recorded_only"
            and .evidenceComplete == true
            and .liveProviderCalls == 0
            and .liveToolCalls == 0
          ' "$RUNNER_TEMP/mealy-live-replay.json" >/dev/null
          target/release/mealyctl --home "$home" status >"$RUNNER_TEMP/mealy-live-status.json"
          jq -e '
            .providerHealth == "healthy"
            and ([.providerEndpoints[].invocationCount] | add // 0) >= 1
          ' "$RUNNER_TEMP/mealy-live-status.json" >/dev/null
          target/release/mealyctl --home "$home" usage --days 1 \
            >"$RUNNER_TEMP/mealy-live-usage.json"
          jq -e '([.buckets[].completedRuns] | add // 0) >= 1' \
            "$RUNNER_TEMP/mealy-live-usage.json" >/dev/null
          if contains_credential \
            "$daemon_stdout" "$daemon_stderr" "$RUNNER_TEMP"/mealy-live-*.json \
            "$home/config.json" "$home"/config-history/*.json; then
            echo "provider credential appeared in live smoke output" >&2
            exit 70
          fi
          credential=
          target/release/mealyctl --home "$home" drain >"$RUNNER_TEMP/mealy-live-drain.json"
          for _ in $(seq 1 400); do
            if ! kill -0 "$daemon_pid" 2>/dev/null; then
              break
            fi
            sleep 0.05
          done
          if kill -0 "$daemon_pid" 2>/dev/null; then
            echo "live-provider daemon did not drain" >&2
            exit 70
          fi
          wait "$daemon_pid"
          daemon_pid=
          echo "live provider smoke passed for $LIVE_PROVIDER/$LIVE_MODEL"
